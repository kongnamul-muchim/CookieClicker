<h2>화려한 파티클!</h2>
<p class="subtitle">더 많고, 더 다채롭게!</p>

<style>
  .demo-area {
    display: flex;
    justify-content: center;
    padding: 40px;
  }
  .cookie-btn {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(145deg, #f5e6d3, #d4a574);
    font-size: 80px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s;
  }
  .cookie-btn:active {
    transform: scale(0.92);
  }
  .click-hint {
    font-size: 14px;
    color: #888;
    margin-top: 15px;
  }
</style>

<div class="demo-area">
  <div style="text-align: center;">
    <button class="cookie-btn" onclick="playParticles(event)">🍪</button>
    <p class="click-hint">클릭!</p>
  </div>
</div>

<script>
  function playParticles(e) {
    const cookieColors = ['#d4a574', '#c9956a', '#b8845a', '#deb887', '#f5deb3', '#d2b48c', '#c4a46d'];
    const sparkleColors = ['gold', '#ffd700', '#ffec8b', '#fff8dc', '#ffefd5'];
    const x = e.clientX;
    const y = e.clientY;
    
    // 큰 쿠키 부스러기
    for (let i = 0; i < 15; i++) {
      setTimeout(() => {
        const crumb = document.createElement('div');
        const size = 8 + Math.random() * 12;
        crumb.style.cssText = `
          position: fixed;
          width: ${size}px;
          height: ${size}px;
          background: ${cookieColors[Math.floor(Math.random() * cookieColors.length)]};
          border-radius: 50%;
          left: ${x}px;
          top: ${y}px;
          pointer-events: none;
          z-index: 1000;
        `;
        document.body.appendChild(crumb);
        
        const angle = Math.random() * Math.PI * 2;
        const dist = 40 + Math.random() * 70;
        const duration = 280 + Math.random() * 100;
        
        crumb.animate([
          { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
          { transform: `translate(calc(-50% + ${Math.cos(angle) * dist}px), calc(-50% + ${Math.sin(angle) * dist + 30}px)) scale(0.1)`, opacity: 0 }
        ], { duration, easing: 'ease-out', fill: 'forwards' });
        
        setTimeout(() => crumb.remove(), duration);
      }, i * 4);
    }
    
    // 작은 부스러기 (먼지)
    for (let i = 0; i < 12; i++) {
      setTimeout(() => {
        const dust = document.createElement('div');
        const size = 3 + Math.random() * 5;
        dust.style.cssText = `
          position: fixed;
          width: ${size}px;
          height: ${size}px;
          background: ${cookieColors[Math.floor(Math.random() * cookieColors.length)]};
          border-radius: 50%;
          left: ${x}px;
          top: ${y}px;
          pointer-events: none;
          z-index: 1000;
          opacity: 0.7;
        `;
        document.body.appendChild(dust);
        
        const angle = Math.random() * Math.PI * 2;
        const dist = 20 + Math.random() * 40;
        
        dust.animate([
          { transform: 'translate(-50%, -50%) scale(1)', opacity: 0.7 },
          { transform: `translate(calc(-50% + ${Math.cos(angle) * dist}px), calc(-50% + ${Math.sin(angle) * dist + 15}px)) scale(0)`, opacity: 0 }
        ], { duration: 200, easing: 'ease-out', fill: 'forwards' });
        
        setTimeout(() => dust.remove(), 200);
      }, i * 3);
    }
    
    // 골드 반짝이
    for (let i = 0; i < 8; i++) {
      setTimeout(() => {
        const sp = document.createElement('div');
        const size = 4 + Math.random() * 6;
        sp.style.cssText = `
          position: fixed;
          width: ${size}px;
          height: ${size}px;
          background: ${sparkleColors[Math.floor(Math.random() * sparkleColors.length)]};
          border-radius: 50%;
          box-shadow: 0 0 8px gold;
          left: ${x}px;
          top: ${y}px;
          pointer-events: none;
          z-index: 1001;
        `;
        document.body.appendChild(sp);
        
        const angle = Math.random() * Math.PI * 2;
        const dist = 50 + Math.random() * 50;
        
        sp.animate([
          { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
          { transform: `translate(calc(-50% + ${Math.cos(angle) * dist}px), calc(-50% + ${Math.sin(angle) * dist}px)) scale(0)`, opacity: 0 }
        ], { duration: 280, easing: 'ease-out', fill: 'forwards' });
        
        setTimeout(() => sp.remove(), 280);
      }, i * 5);
    }
    
    // 작은 쿠키 조각 (이모지)
    for (let i = 0; i < 3; i++) {
      setTimeout(() => {
        const piece = document.createElement('div');
        piece.textContent = '🍪';
        piece.style.cssText = `
          position: fixed;
          font-size: ${15 + Math.random() * 10}px;
          left: ${x}px;
          top: ${y}px;
          pointer-events: none;
          z-index: 1000;
        `;
        document.body.appendChild(piece);
        
        const angle = Math.random() * Math.PI * 2;
        const dist = 35 + Math.random() * 45;
        const rotate = (Math.random() - 0.5) * 720;
        
        piece.animate([
          { transform: 'translate(-50%, -50%) scale(1) rotate(0deg)', opacity: 1 },
          { transform: `translate(calc(-50% + ${Math.cos(angle) * dist}px), calc(-50% + ${Math.sin(angle) * dist + 25}px)) scale(0.3) rotate(${rotate}deg)`, opacity: 0 }
        ], { duration: 320, easing: 'ease-out', fill: 'forwards' });
        
        setTimeout(() => piece.remove(), 320);
      }, i * 8);
    }
  }
</script>

<hr style="margin: 30px 0; border: none; border-top: 1px solid #ddd;">

<h3>어때요?</h3>
<div class="options">
  <div class="option" data-choice="perfect" onclick="toggleSelect(this)">
    <div class="letter">✨</div>
    <div class="content">
      <h3>완벽!</h3>
      <p>이걸로 적용할게요</p>
    </div>
  </div>
  <div class="option" data-choice="more" onclick="toggleSelect(this)">
    <div class="letter">🎆</div>
    <div class="content">
      <h3>더 화려하게!</h3>
      <p>더 많이, 더 크게</p>
    </div>
  </div>
  <div class="option" data-choice="less" onclick="toggleSelect(this)">
    <div class="letter">🔽</div>
    <div class="content">
      <h3>조금 줄이고 싶어요</h3>
    </div>
  </div>
</div>
