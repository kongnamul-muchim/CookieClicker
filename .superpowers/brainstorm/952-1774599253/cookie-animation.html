<h2>쿠키 클릭 애니메이션</h2>
<p class="subtitle">어떤 스타일이 마음에 드시나요?</p>

<div class="mockup">
  <div class="mockup-header">현재: 기본 클릭 (살짝 작아짐)</div>
  <div class="mockup-body" style="display: flex; justify-content: center; gap: 30px; padding: 20px;">
    <div style="text-align: center;">
      <div style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(145deg, #f5e6d3, #d4a574); display: flex; align-items: center; justify-content: center; font-size: 40px;">🍪</div>
      <p style="margin-top: 10px; color: #666;">기본</p>
    </div>
  </div>
</div>

<div class="options">
  <div class="option" data-choice="particles" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>파티클 효과</h3>
      <p>클릭 시 쿠키 조각/반짝이가 튀어나와 사라짐</p>
    </div>
  </div>
  <div class="option" data-choice="ripple" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>물결(리플) 효과</h3>
      <p>클릭 위치에서 원형 파동이 퍼져나감</p>
    </div>
  </div>
  <div class="option" data-choice="crack" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>갈라짐 효과</h3>
      <p>클릭 시 쿠키가 반으로 갈라졌다가 합쳐짐</p>
    </div>
  </div>
  <div class="option" data-choice="bounce" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>통통 튀기</h3>
      <p>쿠키가 위로 살짝 튀어오르며 회전</p>
    </div>
  </div>
</div>

<p style="margin-top: 20px; color: #888; text-align: center;">여러 개 선택 가능합니다</p>
