<h2>파티클만 - 화려한 부스러기</h2>
<p class="subtitle">클릭하면 쿠키 부스러기가 와르르!</p>

<style>
  .demo-area {
    display: flex;
    justify-content: center;
    padding: 40px;
  }
  .cookie-btn {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(145deg, #f5e6d3, #d4a574);
    font-size: 80px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s;
  }
  .cookie-btn:active {
    transform: scale(0.95);
  }
  
  .click-hint {
    font-size: 14px;
    color: #888;
    margin-top: 15px;
  }
</style>

<div class="demo-area">
  <div style="text-align: center;">
    <button class="cookie-btn" onclick="playParticles(event)">🍪</button>
    <p class="click-hint">클릭해보세요!</p>
  </div>
</div>

<script>
  function playParticles(e) {
    const colors = ['#d4a574', '#c9956a', '#b8845a', '#a87349', '#deb887', '#f5deb3'];
    
    // 쿠키 부스러기 (많이!)
    for (let i = 0; i < 20; i++) {
      const crumb = document.createElement('div');
      const size = 4 + Math.random() * 10;
      const color = colors[Math.floor(Math.random() * colors.length)];
      
      crumb.style.cssText = `
        position: fixed;
        width: ${size}px;
        height: ${size}px;
        background: ${color};
        border-radius: 50%;
        left: ${e.clientX}px;
        top: ${e.clientY}px;
        pointer-events: none;
        z-index: 1000;
      `;
      
      document.body.appendChild(crumb);
      
      const angle = Math.random() * Math.PI * 2;
      const distance = 40 + Math.random() * 80;
      const endX = Math.cos(angle) * distance;
      const endY = Math.sin(angle) * distance;
      const duration = 400 + Math.random() * 300;
      
      crumb.animate([
        { transform: 'translate(0, 0) scale(1)', opacity: 1 },
        { transform: `translate(${endX}px, ${endY + 30}px) scale(0.3)`, opacity: 0 }
      ], {
        duration: duration,
        easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
      });
      
      setTimeout(() => crumb.remove(), duration);
    }
    
    // 반짝이 (골드)
    for (let i = 0; i < 8; i++) {
      const sparkle = document.createElement('div');
      const size = 4 + Math.random() * 6;
      
      sparkle.style.cssText = `
        position: fixed;
        width: ${size}px;
        height: ${size}px;
        background: gold;
        border-radius: 50%;
        left: ${e.clientX}px;
        top: ${e.clientY}px;
        pointer-events: none;
        z-index: 1000;
        box-shadow: 0 0 8px gold;
      `;
      
      document.body.appendChild(sparkle);
      
      const angle = Math.random() * Math.PI * 2;
      const distance = 60 + Math.random() * 60;
      const endX = Math.cos(angle) * distance;
      const endY = Math.sin(angle) * distance;
      
      sparkle.animate([
        { transform: 'translate(0, 0) scale(1)', opacity: 1 },
        { transform: `translate(${endX}px, ${endY}px) scale(0)`, opacity: 0 }
      ], {
        duration: 400,
        easing: 'ease-out'
      });
      
      setTimeout(() => sparkle.remove(), 400);
    }
    
    // 작은 쿠키 조각 (큰 것)
    for (let i = 0; i < 4; i++) {
      const piece = document.createElement('div');
      piece.textContent = '🍪';
      piece.style.cssText = `
        position: fixed;
        font-size: 20px;
        left: ${e.clientX - 10}px;
        top: ${e.clientY - 10}px;
        pointer-events: none;
        z-index: 1000;
      `;
      
      document.body.appendChild(piece);
      
      const angle = Math.random() * Math.PI * 2;
      const distance = 50 + Math.random() * 50;
      const endX = Math.cos(angle) * distance;
      const endY = Math.sin(angle) * distance;
      
      piece.animate([
        { transform: 'translate(0, 0) scale(1) rotate(0deg)', opacity: 1 },
        { transform: `translate(${endX}px, ${endY + 20}px) scale(0.2) rotate(${Math.random() * 360}deg)`, opacity: 0 }
      ], {
        duration: 500,
        easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
      });
      
      setTimeout(() => piece.remove(), 500);
    }
  }
</script>

<hr style="margin: 30px 0; border: none; border-top: 1px solid #ddd;">

<h3>어때요?</h3>
<div class="options">
  <div class="option" data-choice="perfect" onclick="toggleSelect(this)">
    <div class="letter">👍</div>
    <div class="content">
      <h3>완벽!</h3>
      <p>이걸로 적용할게요</p>
    </div>
  </div>
  <div class="option" data-choice="more" onclick="toggleSelect(this)">
    <div class="letter">✨</div>
    <div class="content">
      <h3>더 화려하게!</h3>
      <p>파티클 더 많이, 더 크게</p>
    </div>
  </div>
  <div class="option" data-choice="less" onclick="toggleSelect(this)">
    <div class="letter">🔽</div>
    <div class="content">
      <h3>좀 덜하고 싶어요</h3>
      <p>파티클 줄이기</p>
    </div>
  </div>
</div>
