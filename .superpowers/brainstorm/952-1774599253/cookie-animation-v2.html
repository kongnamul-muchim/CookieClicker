<h2>수정된 효과</h2>
<p class="subtitle">파티클 수정 + 갈라짐 때 원본 숨김 + 튀기 제거</p>

<style>
  .demo-area {
    display: flex;
    justify-content: center;
    padding: 40px;
  }
  .demo-cookie {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
  }
  .cookie-btn {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(145deg, #f5e6d3, #d4a574);
    font-size: 80px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  
  /* 파티클 */
  .particle {
    position: fixed;
    width: 12px;
    height: 12px;
    background: #d4a574;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1000;
  }
  
  /* 반짝이 */
  .sparkle {
    position: fixed;
    width: 8px;
    height: 8px;
    background: gold;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1000;
    box-shadow: 0 0 6px gold;
  }
  
  /* 갈라진 쿠키 반쪽 */
  .half-cookie {
    position: fixed;
    font-size: 80px;
    pointer-events: none;
    z-index: 999;
    width: 150px;
    height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .half-cookie.top {
    clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
  }
  .half-cookie.bottom {
    clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%);
  }
  
  .click-hint {
    font-size: 14px;
    color: #888;
  }
</style>

<div class="demo-area">
  <div class="demo-cookie">
    <button class="cookie-btn" id="mainCookie" onclick="playCombo(event, this)">🍪</button>
    <span class="click-hint">클릭해보세요!</span>
  </div>
</div>

<script>
  function playCombo(e, btn) {
    const rect = btn.getBoundingClientRect();
    
    // 1. 클릭 위치에서 파티클 (수정됨)
    for (let i = 0; i < 8; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      const angle = (i / 8) * Math.PI * 2;
      const distance = 60 + Math.random() * 40;
      const endX = Math.cos(angle) * distance;
      const endY = Math.sin(angle) * distance;
      
      particle.style.left = e.clientX + 'px';
      particle.style.top = e.clientY + 'px';
      particle.style.transition = 'all 0.5s ease-out';
      particle.style.opacity = '1';
      
      document.body.appendChild(particle);
      
      requestAnimationFrame(() => {
        particle.style.transform = `translate(${endX}px, ${endY}px)`;
        particle.style.opacity = '0';
      });
      
      setTimeout(() => particle.remove(), 500);
    }
    
    // 반짝이
    for (let i = 0; i < 5; i++) {
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      const angle = Math.random() * Math.PI * 2;
      const distance = 40 + Math.random() * 50;
      const endX = Math.cos(angle) * distance;
      const endY = Math.sin(angle) * distance;
      
      sparkle.style.left = e.clientX + 'px';
      sparkle.style.top = e.clientY + 'px';
      sparkle.style.transition = 'all 0.4s ease-out';
      sparkle.style.opacity = '1';
      
      document.body.appendChild(sparkle);
      
      requestAnimationFrame(() => {
        sparkle.style.transform = `translate(${endX}px, ${endY}px)`;
        sparkle.style.opacity = '0';
      });
      
      setTimeout(() => sparkle.remove(), 400);
    }
    
    // 2. 갈라짐 효과 (원본 숨김)
    btn.style.opacity = '0';
    
    const topHalf = document.createElement('div');
    topHalf.className = 'half-cookie top';
    topHalf.textContent = '🍪';
    topHalf.style.left = rect.left + 'px';
    topHalf.style.top = rect.top + 'px';
    topHalf.style.transition = 'transform 0.3s ease-out';
    
    const bottomHalf = document.createElement('div');
    bottomHalf.className = 'half-cookie bottom';
    bottomHalf.textContent = '🍪';
    bottomHalf.style.left = rect.left + 'px';
    bottomHalf.style.top = rect.top + 'px';
    bottomHalf.style.transition = 'transform 0.3s ease-out';
    
    document.body.appendChild(topHalf);
    document.body.appendChild(bottomHalf);
    
    requestAnimationFrame(() => {
      topHalf.style.transform = 'translate(-15px, -20px) rotate(-15deg)';
      bottomHalf.style.transform = 'translate(15px, 20px) rotate(15deg)';
    });
    
    setTimeout(() => {
      topHalf.style.transform = 'translate(0, 0) rotate(0)';
      bottomHalf.style.transform = 'translate(0, 0) rotate(0)';
    }, 150);
    
    setTimeout(() => {
      topHalf.remove();
      bottomHalf.remove();
      btn.style.opacity = '1';
    }, 300);
  }
</script>

<hr style="margin: 30px 0; border: none; border-top: 1px solid #ddd;">

<h3>어때요?</h3>
<div class="options">
  <div class="option" data-choice="good" onclick="toggleSelect(this)">
    <div class="letter">👍</div>
    <div class="content">
      <h3>좋아요!</h3>
      <p>이대로 적용</p>
    </div>
  </div>
  <div class="option" data-choice="tweak" onclick="toggleSelect(this)">
    <div class="letter">🔧</div>
    <div class="content">
      <h3>더 수정하고 싶어요</h3>
      <p>원하는 대로 말씀해주세요</p>
    </div>
  </div>
</div>
